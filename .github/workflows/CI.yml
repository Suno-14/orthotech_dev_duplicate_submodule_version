name: C++ CI

on:
  push:
  pull_request:

jobs:
  build:

    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Generate Requirements
        run: python scripts/generate_requirements.py

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            g++ \
            make \
            cmake \
            libeigen3-dev

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install CMake (Windows)
        if: runner.os == 'Windows'
        uses: lukka/get-cmake@latest

      - name: Configure Project
        run: cmake -S . -B build

      - name: Build Project
        run: cmake --build build --config Release

      - name: Run Executable (Linux)
        if: runner.os == 'Linux'
        run: ./build/main

      - name: Run Executable (Windows)
        if: runner.os == 'Windows'
        run: .\build\Release\main.exe
