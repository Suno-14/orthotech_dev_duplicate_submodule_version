name: C++ CI
on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Generate Requirements
        run: python scripts/generate_requirements.py

      # -----------------------------------------------
      # Linux
      # -----------------------------------------------
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            g++ \
            make \
            cmake \
            libeigen3-dev

      - name: Configure Project (Linux)
        if: runner.os == 'Linux'
        run: cmake -S . -B build

      # -----------------------------------------------
      # Windows
      # -----------------------------------------------
      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install CMake
        if: runner.os == 'Windows'
        uses: lukka/get-cmake@latest

      - name: Download Eigen (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.zip" `
            -OutFile eigen.zip
          Expand-Archive eigen.zip -DestinationPath C:\eigen
          Write-Host "Eigen extracted to C:\eigen\eigen-3.4.0"
          
      - name: Debug Eigen extraction
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "=== Contents of C:\eigen ==="
          Get-ChildItem -Recurse C:\eigen | Select-Object FullName

      - name: Configure Project (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build `
            -DEigen3_DIR="C:/eigen/eigen-3.4.0/cmake" `
            -DVCPKG_MANIFEST_MODE=OFF
      
      # - name: Configure Project (Windows)
      #   if: runner.os == 'Windows'
      #   shell: pwsh
      #   run: |
      #     cmake -S . -B build `
      #       -DEigen3_DIR="C:/eigen/eigen-3.4.0" `
      #       -DVCPKG_MANIFEST_MODE=OFF

      # -----------------------------------------------
      # Both OS
      # -----------------------------------------------
      - name: Build Project
        run: cmake --build build --config Release

      - name: List Build Files (Linux)
        if: runner.os == 'Linux'
        run: find build -type f

      - name: List Build Files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-ChildItem -Recurse build

      - name: Run Executable (Linux)
        if: runner.os == 'Linux'
        run: ./build/main

      - name: Run Executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\build\Release\main.exe
