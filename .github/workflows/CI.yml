name: C++ CI
on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux build tools and Boost
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            g++ \
            make \
            cmake \
            libboost-all-dev

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install CMake (Windows)
        if: runner.os == 'Windows'
        uses: lukka/get-cmake@latest

      - name: Setup vcpkg and Install Boost (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat -disableMetrics
          .\vcpkg.exe install boost:x64-windows

      - name: Cache vcpkg Boost (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: vcpkg/installed
          key: vcpkg-boost-x64-windows-v1

      - name: Configure Project (Linux)
        if: runner.os == 'Linux'
        run: cmake -S . -B build -DPYTHON_BINDINGS=OFF

      - name: Configure Project (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\vcpkg\vcpkg.exe remove pythoninterp:x64-windows --recurse
          pip install setuptools
          cmake -S . -B build `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DPYTHON_BINDINGS=OFF
            
      - name: Build Project
        run: cmake --build build --config Release

      - name: Run Executable (Linux)
        if: runner.os == 'Linux'
        run: ./build/main

      - name: Run Executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\build\Release\main.exe
