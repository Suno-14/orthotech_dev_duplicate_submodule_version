name: C++ CI
on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Generate Requirements
        run: python scripts/generate_requirements.py

      #  LINUX

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            g++ \
            make \
            cmake \
            libeigen3-dev \
            libboost-all-dev

      - name: Build and Install ur_rtde from Source (Linux)
        if: runner.os == 'Linux'
        run: |
          git clone https://gitlab.com/sdurobotics/ur_rtde.git
          cd ur_rtde
          git submodule update --init --recursive
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DPYTHON_BINDINGS:BOOL=OFF
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Configure Project (Linux)
        if: runner.os == 'Linux'
        run: cmake -S . -B build

      #  WINDOWS 

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install CMake (Windows)
        if: runner.os == 'Windows'
        uses: lukka/get-cmake@latest

      - name: Setup vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat -disableMetrics

      - name: Install Boost and Eigen via vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\vcpkg\vcpkg.exe install boost:x64-windows eigen3:x64-windows

      - name: Build and Install ur_rtde from Source (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone https://gitlab.com/sdurobotics/ur_rtde.git
          cd ur_rtde
          git submodule update --init --recursive
          mkdir build
          cd build
          cmake .. `
            -DCMAKE_BUILD_TYPE=Release `
            -DPYTHON_BINDINGS:BOOL=OFF `
            -DBOOST_ROOT="D:\a\orthotech_dev_duplicate\orthotech_dev_duplicate\vcpkg\installed\x64-windows" `
            -DCMAKE_TOOLCHAIN_FILE="D:\a\orthotech_dev_duplicate\orthotech_dev_duplicate\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_INSTALL_PREFIX="C:\ur_rtde_install"
          cmake --build . --config Release
          cmake --install . --config Release

      - name: Configure Project (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build `
            -DCMAKE_TOOLCHAIN_FILE="D:\a\orthotech_dev_duplicate\orthotech_dev_duplicate\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_PREFIX_PATH="C:\ur_rtde_install"

      # BUILD & RUN 

      - name: Build Project
        run: cmake --build build --config Release

      - name: List Build Files (Linux)
        if: runner.os == 'Linux'
        run: find build -type f

      - name: List Build Files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-ChildItem -Recurse build

      - name: Run Executable (Linux)
        if: runner.os == 'Linux'
        run: ./build/main

      - name: Run Executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\build\Release\main.exe